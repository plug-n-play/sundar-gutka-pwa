<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sundar Gutka</title>
  <meta name="description"
    content="A lightweight, offline-first Progressive Web App version of Sundar Gutka with custom settings and layouts." />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e5a93b" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" />
  </noscript>
  <style>
    /* Immediate dark background setup to prevent white flash */
    body {
      background-color: #0a1118; /* matches --bg-primary */
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100svh;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      background-color: #111c26; /* matches --bg-secondary */
      border-left: 1px solid #202f3e; /* matches --border-color */
      border-right: 1px solid #202f3e;
      box-shadow: rgba(0, 0, 0, 0.4) 0 10px 15px -3px, rgba(0, 0, 0, 0.2) 0 4px 6px -2px;
    }

    .initial-splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      padding: 24px;
      box-sizing: border-box;
      animation: fadeIn 0.4s ease-out;
    }

    .splash-logo {
      font-size: 56px;
      color: #e5a93b;
      margin-bottom: 16px;
      font-weight: 300;
      line-height: 1;
    }

    .splash-title {
      font-size: 24px;
      font-weight: 500;
      color: #e0e1dd;
      margin: 0 0 8px 0;
      letter-spacing: 0.5px;
    }

    .splash-subtitle {
      font-size: 14px;
      color: #8d99ae;
      margin: 0 0 28px 0;
    }

    .splash-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(229, 169, 59, 0.15);
      border-radius: 50%;
      border-top-color: #e5a93b;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="initial-splash-container">
      <div class="splash-logo">&lt;&gt;</div>
      <h1 class="splash-title">ਸੁੰਦਰ ਗੁਟਕਾ</h1>
      <p class="splash-subtitle">Sundar Gutka</p>
      <div class="splash-spinner" aria-label="Loading application"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
